{{#instructor}}  <!-- ============================================================= -->
  <!-- INSTRUCTOR                                                    -->
  <!-- ============================================================= -->
  <section class="section instructor">
    <div class="wrap wrap--narrow instructor__inner">
      <img class="instructor__photo" src="{{{photo.src}}}"
           alt="{{{photo.alt}}}"
           width="{{{photo.width}}}" height="{{{photo.height}}}" loading="lazy">
      <div class="instructor__body">
        <p class="eyebrow">{{{eyebrow}}}</p>
        <h2 class="section__title">Meet <span class="accent-purple">{{{name}}}</span></h2>
        <p>
          {{{bio}}}
        </p>
        <p class="instructor__cred">
          {{{credential_line}}}
        </p>
      </div>
    </div>
  </section>

{{/instructor}}
